<!DOCTYPE html>
<html lang="fr">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>RGB2XYZ — Visualisation 3D des couleurs</title>
      <style>
            * {
                  margin: 0;
                  padding: 0;
                  box-sizing: border-box;
            }

            body {
                  background: #0a0a0a;
                  color: #e0e0e0;
                  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
                  overflow: hidden;
                  height: 100vh;
            }

            #ui {
                  position: fixed;
                  top: 20px;
                  left: 20px;
                  z-index: 10;
                  display: flex;
                  flex-direction: column;
                  gap: 12px;
                  max-width: 320px;
            }

            #file-label {
                  display: inline-flex;
                  align-items: center;
                  gap: 8px;
                  padding: 10px 20px;
                  background: rgba(255, 255, 255, 0.08);
                  border: 1px solid rgba(255, 255, 255, 0.15);
                  border-radius: 8px;
                  cursor: pointer;
                  font-size: 14px;
                  transition: background 0.2s, border-color 0.2s;
                  backdrop-filter: blur(12px);
            }

            #file-label:hover {
                  background: rgba(255, 255, 255, 0.14);
                  border-color: rgba(255, 255, 255, 0.3);
            }

            #file-input {
                  display: none;
            }

            #stats {
                  padding: 12px 16px;
                  background: rgba(0, 0, 0, 0.6);
                  border: 1px solid rgba(255, 255, 255, 0.08);
                  border-radius: 8px;
                  font-size: 13px;
                  line-height: 1.6;
                  backdrop-filter: blur(12px);
                  display: none;
            }

            #stats.visible {
                  display: block;
            }

            #stats span {
                  color: #8cb4ff;
                  font-weight: 600;
            }

            #progress {
                  display: none;
                  padding: 10px 16px;
                  background: rgba(0, 0, 0, 0.6);
                  border: 1px solid rgba(255, 255, 255, 0.08);
                  border-radius: 8px;
                  font-size: 13px;
                  backdrop-filter: blur(12px);
            }

            #progress.visible {
                  display: block;
            }

            #density-wrapper {
                  display: none;
                  padding: 10px 16px;
                  background: rgba(0, 0, 0, 0.6);
                  border: 1px solid rgba(255, 255, 255, 0.08);
                  border-radius: 8px;
                  font-size: 13px;
                  backdrop-filter: blur(12px);
            }

            #density-wrapper.visible {
                  display: block;
            }

            #density-wrapper label {
                  display: flex;
                  align-items: center;
                  gap: 8px;
            }

            #density-slider {
                  flex: 1;
                  accent-color: #8cb4ff;
            }

            #canvas-container {
                  width: 100vw;
                  height: 100vh;
            }

            canvas {
                  display: block;
            }
      </style>
</head>

<body>
      <div id="ui">
            <label id="file-label">
                  📂 Charger une image
                  <input type="file" id="file-input" accept="image/*">
            </label>
            <div id="progress">Traitement en cours…</div>
            <div id="density-wrapper">
                  <label>
                        Densité
                        <input type="range" id="density-slider" min="10000" max="1000000" step="10000" value="500000">
                        <span id="density-value">500k</span>
                  </label>
            </div>
            <div id="stats">
                  Pixels : <span id="stat-pixels">—</span><br>
                  Couleurs uniques : <span id="stat-colors">—</span><br>
                  Affichés : <span id="stat-displayed">—</span><br>
                  Compression : <span id="stat-compression">—</span><br>
                  Temps : <span id="stat-time">—</span>
            </div>
      </div>
      <div id="canvas-container"></div>

      <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"
      }
    }
  </script>
      <script type="module" src="src/main.js"></script>
</body>

</html>
